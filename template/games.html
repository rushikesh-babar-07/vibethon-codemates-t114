<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Games - AIML Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">AIML Platform</a>
    <div class="navbar-nav">
        <a class="nav-link" href="/learn">Learn</a>
        <a class="nav-link active" href="/games">Games</a>
        <a class="nav-link" href="/coding">Coding</a>
        <a class="nav-link" href="/quiz">Quiz</a>
        <a class="nav-link" href="/problems">Real Problems</a>
    </div>
</nav>

<div class="container mt-5 text-center">

    <h2>🎮 Interactive Learning Games</h2>
    <p>Learn AI/ML concepts by playing!</p>

    <!-- 🏆 SCORE -->
    <h4 class="mt-4">Score: <span id="score">0</span></h4>

    <!-- 🎯 GAME 1 -->
    <div class="card p-4 mt-4 text-center">
    <h4 class="mb-3">🎯 Guess the Concept</h4>
    <p id="question1" class="fs-5">Netflix recommending movies</p>

    <div class="mt-3">
        <button class="btn btn-primary m-2 px-4">Classification</button>
        <button class="btn btn-warning m-2 px-4">Regression</button>
        <button class="btn btn-success m-2 px-4">Clustering</button>
    </div>

    <p class="mt-3" id="result1"></p>
</div>

    <!-- 🎯 GAME 2 -->
    <div class="card p-4 mt-4 text-center">
    <h4 class="mb-3">🎯 Guess the Concept</h4>
    <p id="question1" class="fs-5">Predicting house prices based on features</p>

    <div class="mt-3">
        <button class="btn btn-primary m-2 px-4">Classification</button>
        <button class="btn btn-warning m-2 px-4">Regression</button>
        <button class="btn btn-success m-2 px-4">Clustering</button>
    </div>

    <p class="mt-3" id="result1"></p>
</div>

    <!-- 🔄 NEXT BUTTON -->
    <button class="btn btn-dark mt-4" onclick="nextQuestions()">Next Questions</button>

</div>

<script>

let score = 0;

// GAME 1
function checkAnswer1(ans){
    if(ans === 'classification'){
        document.getElementById("result1").innerHTML = "✅ Correct! Recommendation is classification.";
        score++;
    } else {
        document.getElementById("result1").innerHTML = "❌ Incorrect!";
    }
    updateScore();
}

// GAME 2
function checkAnswer2(ans){
    if(ans === 'regression'){
        document.getElementById("result2").innerHTML = "✅ Correct! Price prediction is regression.";
        score++;
    } else {
        document.getElementById("result2").innerHTML = "❌ Incorrect!";
    }
    updateScore();
}

// UPDATE SCORE
function updateScore(){
    document.getElementById("score").innerText = score;
}

// NEXT QUESTIONS
function nextQuestions(){
    document.getElementById("question1").innerText = "Email spam detection problem";
    document.getElementById("question2").innerText = "Grouping customers based on behavior";

    document.getElementById("result1").innerHTML = "";
    document.getElementById("result2").innerHTML = "";
}

</script>
<script>
// Add glow effect on click
document.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
        btn.classList.add("glow");
        setTimeout(() => btn.classList.remove("glow"), 300);
    });
});
</script>
</body>
</html>
